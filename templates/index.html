<!DOCTYPE html>
<html>
<head>
    <title>Zabbix Event Generator</title>
    <style>
        body { font-family: monospace; background: #222; color: #0f0; padding: 20px; }
        table { border: 1px solid #0f0; width: 100%; }
        td, th { padding: 10px; border-bottom: 1px solid #333; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Панель управления инцидентами</h1>
    <p>Target: {{ z_server }} | Host: {{ host }}</p>
    <table>
        <tr>
            <th>Описание</th>
            <th>Ключ (Item Key)</th>
            <th>Значение</th>
            <th>Действие</th>
        </tr>
        {% for key, desc in metrics.items() %}
        <tr>
            <form action="/send" method="post">
                <td>{{ desc }}</td>
                <td><input type="hidden" name="key" value="{{ key }}">{{ key }}</td>
                <td><input type="text" name="value" value="1" size="5"></td>
                <td><button type="submit">ОТПРАВИТЬ</button></td>
            </form>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
